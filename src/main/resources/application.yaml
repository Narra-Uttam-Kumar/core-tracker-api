spring:
  application:
    name: core-tracker-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  threads:
    virtual:
      enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 18000000

    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

  rate-limit:
    capacity: 100
    refill-rate: 10

server:
  port: ${PORT:8080}