spring:
  application:
    name: core-tracker-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    open-in-view: false  # Silences OSIV warning & releases DB connections early
    hibernate:
      ddl-auto: none
    show-sql: false      # Recommended 'false' in production for cleaner Render logs

  threads:
    virtual:
      enabled: true     # Takes advantage of Java 21 Loom virtual threads

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 18000000 # 5 Hours
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  rate-limit:
    capacity: 100
    refill-rate: 10

server:
  port: ${PORT:8080}