spring:
  application:
    name: core-tracker-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  threads:
    virtual:
      enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 18000000
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

  rate-limit:
    capacity: 100
    refill-rate: 10

server:
  port: ${PORT:8080}